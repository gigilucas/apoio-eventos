<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Evento - Apoio a Eventos Académicos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>Apoio a Eventos Académicos</h1>
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/eventos" class="nav-link">Eventos</a>
                <a href="/participantes" class="nav-link">Participantes</a>
                <a href="/inscricoes" class="nav-link">Inscrições</a>
                <a href="/sessoes" class="nav-link">Sessões</a>
                <a href="/certificados" class="nav-link">Certificados</a>
                <a href="/logout" class="nav-link logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Editar Evento</h2>
            <a href="/eventos" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Voltar</a>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="eventoForm">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="dataInicio">Data Início:</label>
                <input type="datetime-local" id="dataInicio" name="dataInicio" required>
            </div>

            <div class="form-group">
                <label for="dataFim">Data Fim:</label>
                <input type="datetime-local" id="dataFim" name="dataFim" required>
            </div>

            <div class="form-group">
                <label for="local">Local:</label>
                <input type="text" id="local" name="local" required>
            </div>

            <div class="form-group">
                <label for="capacidadeMaxima">Capacidade Máxima:</label>
                <input type="number" id="capacidadeMaxima" name="capacidadeMaxima" required>
            </div>

            <div class="form-group">
                <label for="estaAtivo">Estado Ativo:</label>
                <select id="estaAtivo" name="estaAtivo" required>
                    <option value="true">Ativo</option>
                    <option value="false">Inativo</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Atualizar Evento</button>
        </form>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/evento-editar.js}"></script>
</body>
</html>
