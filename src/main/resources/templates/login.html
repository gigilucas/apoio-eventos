<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apoio a Eventos Académicos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Apoio a Eventos Académicos</h1>
            <h2>Login</h2>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            
            <p style="text-align: center; margin-top: 1rem;">
                Não tem conta? <a href="/register" id="registerLink" style="color: #3498db; text-decoration: none; font-weight: 500;">Criar conta</a>
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('registerLink').addEventListener('click', function(e) {
            sessionStorage.setItem('goingToRegister', 'true');
        });
    </script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
