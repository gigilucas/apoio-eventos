<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Inscrição - Apoio a Eventos Académicos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>Apoio a Eventos Académicos</h1>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/eventos">Eventos</a>
                <a href="/participantes">Participantes</a>
                <a href="/inscricoes">Inscrições</a>
                <a href="/sessoes">Sessões</a>
                <a href="/certificados">Certificados</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Nova Inscrição</h2>
            <a href="/inscricoes" class="btn btn-secondary">Voltar</a>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="inscricaoForm">
            <div class="form-group">
                <label for="participanteId">Participante:</label>
                <select id="participanteId" name="participanteId" required>
                    <option value="">Selecione um participante</option>
                </select>
            </div>

            <div class="form-group">
                <label for="eventoId">Evento:</label>
                <select id="eventoId" name="eventoId" required>
                    <option value="">Selecione um evento</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Criar Inscrição</button>
        </form>
    </div>

    <script th:src="@{/js/inscricao-nova.js}"></script>
</body>
</html>
