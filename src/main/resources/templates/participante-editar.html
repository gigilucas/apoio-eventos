<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Participante - Apoio a Eventos Académicos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>Apoio a Eventos Académicos</h1>
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/eventos" class="nav-link">Eventos</a>
                <a href="/participantes" class="nav-link">Participantes</a>
                <a href="/inscricoes" class="nav-link">Inscrições</a>
                <a href="/sessoes" class="nav-link">Sessões</a>
                <a href="/certificados" class="nav-link">Certificados</a>
                <a href="/logout" class="nav-link logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Editar Participante</h2>
            <a href="/participantes" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Voltar</a>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="participanteForm">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone">
            </div>

            <div class="form-group">
                <label for="numeroEstudante">Número de Estudante:</label>
                <input type="text" id="numeroEstudante" name="numeroEstudante">
            </div>

            <div class="form-group">
                <label for="curso">Curso:</label>
                <input type="text" id="curso" name="curso">
            </div>

            <button type="submit" class="btn btn-primary">Atualizar Participante</button>
        </form>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/participante-editar.js}"></script>
</body>
</html>
