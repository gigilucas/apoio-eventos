<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participantes - Apoio a Eventos Académicos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>Apoio a Eventos Académicos</h1>
            <div class="nav-links">
                <a href="/eventos" class="nav-link">Eventos</a>
                <a href="/participantes" class="nav-link active">Participantes</a>
                <a href="/inscricoes" class="nav-link">Inscrições</a>
                <a href="/sessoes" class="nav-link">Sessões</a>
                <a href="/certificados" class="nav-link">Certificados</a>
                <a href="/logout" class="nav-link logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Participantes</h2>
            <button onclick="window.location.href='/participantes/novo'" class="btn btn-primary">Novo Participante</button>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div class="table-container">
            <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Curso</th>
                    <th>Role</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="participantesTable">
                <!-- Dados serão carregados via JavaScript -->
            </tbody>
            </table>
        </div>
    </div>

    <script th:src="@{/js/participantes.js}"></script>
</body>
</html>
